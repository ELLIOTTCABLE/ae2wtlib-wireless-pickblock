plugins {
    id 'java-library'
    id 'eclipse'
    id 'idea'
    id 'maven-publish'
    id 'net.neoforged.gradle.userdev' version '7.0.97'
}

version = mod_version
group = mod_group_id

repositories {
    mavenLocal()
    maven { name = "ModMaven"; url = "https://modmaven.dev" }                 // AE2, and (likely) AE2WTLib
    maven { name = "Modrinth"; url = "https://api.modrinth.com/maven" }       // AE2WTLib fallback (maven.modrinth:...)
}

base {
    archivesName = mod_id
}

// Mojang ships Java 17 to end users in 1.18+, so your mod should target Java 17.
java.toolchain.languageVersion = JavaLanguageVersion.of(17)

// Default run configurations. NeoGradle wires the Mixin annotation processor for these source sets.
runs {
    configureEach {
        systemProperty 'forge.logging.markers', 'REGISTRIES'
        systemProperty 'forge.logging.console.level', 'debug'
        modSource project.sourceSets.main
    }

    client {
        systemProperty 'forge.enabledGameTestNamespaces', project.mod_id
    }

    server {
        systemProperty 'forge.enabledGameTestNamespaces', project.mod_id
        programArgument '--nogui'
    }

    gameTestServer {
        systemProperty 'forge.enabledGameTestNamespaces', project.mod_id
    }

    data {
        programArguments.addAll '--mod', project.mod_id, '--all', '--output', file('src/generated/resources/').getAbsolutePath(), '--existing', file('src/main/resources/').getAbsolutePath()
    }
}

// Include resources generated by data generators.
sourceSets.main.resources { srcDir 'src/generated/resources' }

// 'localRuntime' is for runtime-only deps we do NOT want to publish as transitive (e.g. a full mod jar
// only needed to launch the dev client). See the plan: running a dev client needs the full AE2 + AE2WTLib
// dependency tree, which is heavy — testing in the real pack is usually easier.
configurations {
    runtimeClasspath.extendsFrom localRuntime
}

dependencies {
    implementation "net.neoforged:neoforge:${neo_version}"

    // ---- Mod dependencies we compile against (see IMPLEMENTATION_PLAN.md "Build wiring") ----
    // Both compileOnly: the real AE2 + AE2WTLib are present at runtime (in the pack / on the server).
    // transitive=false keeps only each mod's own classes on the compile classpath — we don't want their
    // whole dep trees (curios, etc.) just to reference a handful of types.

    // AE2 — storage API used by the server-side extraction: Actionable, AEItemKey, PlayerSource, IGrid,
    //       getStorageService().getInventory(). Served by ModMaven.
    compileOnly("appeng:appliedenergistics2-neoforge:${ae2_version}") { transitive = false }

    // AE2WTLib — we ride on its (internal, frozen-on-17.x) CraftingTerminalHandler to find the carried
    //       terminal, its linked grid, and range. ModMaven only mirrors AE2WTLib's 19.x (1.21) line, so the
    //       frozen 17.x line comes from Modrinth's maven instead. The Modrinth artifact id is the project
    //       slug (project id pNabrMMw); the jar it serves is the same ae2wtlib-17.12.0-beta.jar the pack
    //       ships, so CI resolves it with no committed binary. Offline fallback: drop that jar into ./libs
    //       and swap this line for `compileOnly files("libs/ae2wtlib-${ae2wtlib_version}.jar")`.
    compileOnly("maven.modrinth:applied-energistics-2-wireless-terminals:${ae2wtlib_version}") { transitive = false }
}

// Expand placeholders (${mod_id} etc.) in mods.toml from the properties above.
tasks.withType(ProcessResources).configureEach {
    var replaceProperties = [
            minecraft_version      : minecraft_version,
            minecraft_version_range: minecraft_version_range,
            neo_version            : neo_version,
            neo_version_range      : neo_version_range,
            loader_version_range   : loader_version_range,
            mod_id                 : mod_id,
            mod_name               : mod_name,
            mod_license            : mod_license,
            mod_version            : mod_version,
            mod_authors            : mod_authors,
            mod_description        : mod_description
    ]
    inputs.properties replaceProperties

    filesMatching(['META-INF/mods.toml']) {
        expand replaceProperties
    }
}

publishing {
    publications {
        register('mavenJava', MavenPublication) {
            from components.java
        }
    }
    repositories {
        maven {
            url "file://${project.projectDir}/repo"
        }
    }
}

tasks.withType(JavaCompile).configureEach {
    options.encoding = 'UTF-8'
}

idea {
    module {
        downloadSources = true
        downloadJavadoc = true
    }
}

// Stable-named copy of the mod jar so a dev symlink survives version bumps;
// the versioned build/libs jar is still produced for distribution.
tasks.register('devJar', Copy) {
    from tasks.jar
    into layout.buildDirectory.dir('devlibs')
    rename { "${mod_id}-dev.jar" }
}
tasks.named('build') { dependsOn 'devJar' }
